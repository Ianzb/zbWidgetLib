name: Release Build

env:
  PROGRAM_NAME: "zbWidgetLib"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: 安装项目
        run: uv sync --all-extras --dev

      - name: 更新版本号
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrEmpty($inputVersion)) {
            Write-Host "未指定版本号，使用当前版本号"
            uv run script\release_build.py
          } else {
            Write-Host "使用指定版本号: $inputVersion"
            uv run script\release_build.py -v "$inputVersion"
          }

      - name: 校验构建输出
        id: check_output
        shell: pwsh
        run: |
          $out = Get-Content -Raw script\release_output.json | ConvertFrom-Json
          $version = $out.version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT

      - name: 构建分发包
        run: |
          uv build --no-sources

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROGRAM_NAME }}.zip
          path: dist/

      - name: 提交版本更新
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -u
          if (-not (git diff --cached --quiet)) {
            git stash
            git pull --rebase origin main
            git stash pop
            git add -u
            git commit -m "Update version to ${{ steps.check_output.outputs.version }} [ci skip]"
            git push origin main
          } else {
            Write-Host "无版本变更"
          }

  pypi-publish:
    name: 发布到 PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write

    environment: release

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PROGRAM_NAME }}.zip
          path: dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          verbose: true
